<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0A3161" />
  <title>⚽ ניחושי מונדיאל 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>" />
</head>
<body>
  <!-- רקע כוכבים מונפש -->
  <div class="stars-bg" aria-hidden="true"></div>

  <!-- כותרת עליונה -->
  <header class="top">
    <div class="brand">
      <span class="ball">⚽</span>
      <div class="brand-txt">
        <strong>מונדיאל 2026</strong>
        <small>ניחושי הנוקאאוט</small>
      </div>
    </div>
    <div class="userbox" id="userbox"></div>
  </header>

  <main class="wrap">
    <!-- מסך התחברות -->
    <section id="auth">
      <div class="hero">
        <div class="hero-stripes" aria-hidden="true"></div>
        <div class="hero-content">
          <div class="trophy">🏆</div>
          <h1>ניחושי מונדיאל 2026</h1>
          <p class="hero-sub">נחשו מי עולה ומה התוצאה — וטפסו לראש הטבלה</p>
          <div class="host-flags" aria-hidden="true">
            <img src="https://flagcdn.com/ca.svg" alt="Canada" loading="lazy" />
            <img src="https://flagcdn.com/us.svg" alt="USA" class="host-main" loading="lazy" />
            <img src="https://flagcdn.com/mx.svg" alt="Mexico" loading="lazy" />
          </div>
          <p class="host-cap">ארה״ב · קנדה · מקסיקו</p>
        </div>
      </div>

      <div class="card auth-card">
        <h2>כניסה למשחק</h2>
        <p class="sub">נרשמים עם מייל בלבד. בכל כניסה נשלח קוד אקראי לאימות.</p>

        <div id="step-email">
          <label for="email">כתובת מייל</label>
          <input type="email" id="email" placeholder="name@example.com" autocomplete="email" inputmode="email" />
          <button class="btn btn-block btn-glow" id="btn-send-code">שלחו לי קוד ⚡</button>
        </div>

        <div id="step-code" class="hide">
          <div class="msg info" id="demo-box"></div>
          <label for="code">הזינו את הקוד בן 6 הספרות</label>
          <input type="text" id="code" inputmode="numeric" maxlength="6" placeholder="••••••" class="code-input" />
          <div class="row">
            <button class="btn btn-glow" id="btn-verify">אישור והתחברות</button>
            <button class="btn ghost" id="btn-back">חזרה</button>
          </div>
        </div>
        <div id="auth-msg"></div>
      </div>
    </section>

    <!-- אזור מחובר -->
    <section id="app" class="hide">
      <div id="tab-matches"></div>
      <div id="tab-leaderboard" class="hide"></div>
      <div id="tab-rules" class="hide"></div>
      <div id="tab-admin-panel" class="hide"></div>
    </section>
  </main>

  <!-- ניווט תחתון (מובייל) / עליון (דסקטופ) -->
  <nav class="tabs hide" id="nav">
    <button data-tab="matches" class="active"><span class="ic">⚽</span><span class="lb">משחקים</span></button>
    <button data-tab="leaderboard"><span class="ic">🏆</span><span class="lb">דירוג</span></button>
    <button data-tab="rules"><span class="ic">📜</span><span class="lb">חוקים</span></button>
    <button data-tab="admin" id="tab-admin" class="hide"><span class="ic">⚙️</span><span class="lb">ניהול</span></button>
  </nav>

  <div id="confetti" class="confetti-layer" aria-hidden="true"></div>
  <script src="app.js"></script>
</body>
</html>
