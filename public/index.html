<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0A3161" />
  <title>⚽ ניחושי מונדיאל 2026 — שמינית הגמר</title>

  <!-- כרטיס שיתוף (Open Graph / Twitter) -->
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="he_IL" />
  <meta property="og:url" content="https://mondial-loop-it.onrender.com/" />
  <meta property="og:site_name" content="ניחושי מונדיאל 2026" />
  <meta property="og:title" content="⚽ מונדיאל 2026 — שמינית הגמר... מי האלופה? 🏆" />
  <meta property="og:description" content="הצטרפו לניחושי המונדיאל! אפשר להמר עד 22:00 הערב — יום ראשון, 28.6.2026. נחשו מי עולה ומה התוצאה, צברו נקודות, וטפסו לראש הטבלה 🥇" />
  <meta property="og:image" content="https://mondial-loop-it.onrender.com/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="⚽ מונדיאל 2026 — שמינית הגמר... מי האלופה? 🏆" />
  <meta name="twitter:description" content="הצטרפו לניחושי המונדיאל! אפשר להמר עד 22:00 הערב (28.6.2026). מי ייקח את הגביע?" />
  <meta name="twitter:image" content="https://mondial-loop-it.onrender.com/og-image.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="מונדיאל 2026" />
</head>
<body>
  <!-- רקע כוכבים מונפש -->
  <div class="stars-bg" aria-hidden="true"></div>

  <!-- כותרת עליונה -->
  <header class="top">
    <div class="brand">
      <span class="ball">⚽</span>
      <div class="brand-txt">
        <strong>מונדיאל 2026</strong>
        <small>ניחושי הנוקאאוט</small>
      </div>
    </div>
    <div class="userbox" id="userbox"></div>
  </header>

  <main class="wrap">
    <!-- מסך התחברות -->
    <section id="auth">
      <div class="hero">
        <div class="hero-stripes" aria-hidden="true"></div>
        <div class="hero-content">
          <div class="trophy">🏆</div>
          <h1>ניחושי מונדיאל 2026</h1>
          <p class="hero-sub">נחשו מי עולה ומה התוצאה — וטפסו לראש הטבלה</p>
          <div class="host-flags" aria-hidden="true">
            <img src="https://flagcdn.com/ca.svg" alt="Canada" loading="lazy" />
            <img src="https://flagcdn.com/us.svg" alt="USA" class="host-main" loading="lazy" />
            <img src="https://flagcdn.com/mx.svg" alt="Mexico" loading="lazy" />
          </div>
          <p class="host-cap">ארה״ב · קנדה · מקסיקו</p>
        </div>
      </div>

      <div class="card auth-card">
        <div class="auth-toggle">
          <button id="tab-login" class="active">כניסה</button>
          <button id="tab-register">הרשמה</button>
        </div>
        <p class="sub" id="auth-sub">היכנסו עם שם המשתמש והסיסמה שלכם.</p>
        <div id="auth-deadline"></div>

        <label for="username">שם משתמש (כינוי)</label>
        <input type="text" id="username" placeholder="הכינוי שלך במשחק" autocomplete="username" maxlength="20" />
        <div style="height:10px"></div>
        <label for="password">סיסמה</label>
        <input type="password" id="password" placeholder="בחרו סיסמה" autocomplete="current-password" />

        <button class="btn btn-block btn-glow" id="btn-auth">כניסה ⚽</button>
        <div id="auth-msg"></div>
      </div>
    </section>

    <!-- אזור מחובר -->
    <section id="app" class="hide">
      <div id="tab-matches"></div>
      <div id="tab-leaderboard" class="hide"></div>
      <div id="tab-rules" class="hide"></div>
      <div id="tab-admin-panel" class="hide"></div>
    </section>

    <footer class="site-footer">
      <img src="https://flagcdn.com/ar.svg" alt="" class="ar-flag" />
      <span>כל הזכויות והזכיות שמורות ל<b>יובל לבארי</b> · בהצלחה לארגנטינה 🏆</span>
    </footer>
  </main>

  <!-- ניווט תחתון (מובייל) / עליון (דסקטופ) -->
  <nav class="tabs hide" id="nav">
    <button data-tab="matches" class="active"><span class="ic">⚽</span><span class="lb">משחקים</span></button>
    <button data-tab="leaderboard"><span class="ic">🏆</span><span class="lb">דירוג</span></button>
    <button data-tab="rules"><span class="ic">📜</span><span class="lb">חוקים</span></button>
    <button data-tab="admin" id="tab-admin" class="hide"><span class="ic">⚙️</span><span class="lb">ניהול</span></button>
  </nav>

  <!-- באנר התקנת אפליקציה -->
  <div id="install-banner" class="install-banner hide">
    <span class="ib-txt">📲 התקינו את האפליקציה למסך הבית</span>
    <button id="btn-install" class="btn small">התקנה</button>
    <button id="install-close" class="ib-x" aria-label="סגור">✕</button>
  </div>

  <div id="confetti" class="confetti-layer" aria-hidden="true"></div>
  <script src="app.js"></script>
</body>
</html>
