# דוגמת הגדרת nginx — חושפת את האפליקציה (שרצה על פורט 3100) בכתובת:
#   https://<הדומיין-שלך>/loop-it-mondial
#
# העתיקו את בלוק ה-location לתוך ה-server { } הקיים של האתר שלכם,
# או השתמשו בקובץ כבסיס. אחרי שינוי:  sudo nginx -t && sudo systemctl reload nginx

# מפנה /loop-it-mondial → /loop-it-mondial/ (חובה סלאש בסוף כדי שהנכסים יטענו נכון)
location = /loop-it-mondial { return 301 /loop-it-mondial/; }

location /loop-it-mondial/ {
    proxy_pass         http://127.0.0.1:3100/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
}

