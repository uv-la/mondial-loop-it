# Blueprint לפריסה ב-Render. ב-Render בוחרים "New +" → "Blueprint" ומצביעים על הריפו.
services:
  - type: web
    name: mondial-2026
    runtime: node
    plan: starter            # נדרש לדיסק קבוע. לתוכנית חינם הסירו את 'plan' ואת 'disk' (אך הנתונים יתאפסו בכל פריסה).
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: ADMIN_EMAILS
        value: uv.levari@gmail.com
      - key: DB_PATH
        value: /data/mondial.db
      # פרטי המייל (SMTP) — הזינו את הערכים בלוח הבקרה של Render (Environment), לא כאן:
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_SECURE
        value: "true"
      - key: SMTP_USER
        sync: false          # תזינו בלוח הבקרה (סוד)
      - key: SMTP_PASS
        sync: false          # תזינו בלוח הבקרה (App Password — סוד!)
      - key: MAIL_FROM
        sync: false
    disk:
      name: mondial-data
      mountPath: /data
      sizeGB: 1
