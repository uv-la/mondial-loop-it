# Blueprint לפריסה ב-Render. ב-Render בוחרים "New +" → "Blueprint" ומצביעים על הריפו.
services:
  - type: web
    name: mondial-loop-it
    runtime: node
    region: frankfurt        # קרוב לישראל = מהיר (כמו שאר השירותים שלך)
    plan: free               # ⚠️ חינם = אין דיסק קבוע, מסד הנתונים מתאפס בכל פריסה/רדימה. לשמירת נתונים שדרגו ל-starter והוסיפו בלוק disk.
    buildCommand: npm install
    startCommand: npm start
    domains:
      - mondial.loop-it.org  # תת-הדומיין שיחובר לאתר (צריך גם רשומת DNS — ראו DEPLOY.md)
    envVars:
      - key: NODE_VERSION
        value: "22"
      # שם המשתמש (כינוי) שיהיה אדמין. אם ריק — המשתמש הראשון שנרשם הוא האדמין.
      - key: ADMIN_USERS
        sync: false
      # (בתוכנית חינם אין DB_PATH — מסד הנתונים נשמר מקומית ב-./mondial.db ומתאפס בכל פריסה)
      # עדכון משחקים+תוצאות אוטומטי (API-Football). הזינו את המפתח בלוח הבקרה:
      - key: FOOTBALL_API_KEY
        sync: false
      - key: WC_LEAGUE_ID
        value: "1"            # מזהה המונדיאל ב-API-Football
      - key: WC_SEASON
        value: "2026"
      - key: POLL_MINUTES
        value: "120"         # משיכה אוטומטית כל שעתיים
