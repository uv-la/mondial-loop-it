# Blueprint לפריסה ב-Render. ב-Render בוחרים "New +" → "Blueprint" ומצביעים על הריפו.
services:
  - type: web
    name: mondial-loop-it
    runtime: node
    region: frankfurt        # קרוב לישראל = מהיר (כמו שאר השירותים שלך)
    plan: starter            # נדרש לדיסק קבוע — שומר את הנתונים (משתמשים, ניחושים, דירוג) בין פריסות.
    buildCommand: npm install
    startCommand: npm start
    # (להוספת תת-דומיין בעתיד: domains: [mondial.loop-it.org] + רשומת DNS — ראו DEPLOY-loop-it.md)
    envVars:
      - key: NODE_VERSION
        value: "22"
      # שם המשתמש (כינוי) שיהיה אדמין. אם ריק — המשתמש הראשון שנרשם הוא האדמין.
      - key: ADMIN_USERS
        sync: false
      # מסד הנתונים נשמר על הדיסק הקבוע (מוגדר למטה) כדי שלא יימחק בין פריסות:
      - key: DB_PATH
        value: /data/mondial.db
      # עדכון משחקים+תוצאות אוטומטי (API-Football). הזינו את המפתח בלוח הבקרה:
      - key: FOOTBALL_API_KEY
        sync: false
      - key: WC_LEAGUE_ID
        value: "1"            # מזהה המונדיאל ב-API-Football
      - key: WC_SEASON
        value: "2026"
      - key: POLL_MINUTES
        value: "120"         # משיכה אוטומטית כל שעתיים
    disk:
      name: mondial-data
      mountPath: /data       # כאן נשמר mondial.db — נתונים קבועים
      sizeGB: 1
