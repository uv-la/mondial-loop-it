# Blueprint לפריסה ב-Render. ב-Render בוחרים "New +" → "Blueprint" ומצביעים על הריפו.
services:
  - type: web
    name: mondial-loop-it
    runtime: node
    region: frankfurt        # קרוב לישראל = מהיר (כמו שאר השירותים שלך)
    plan: free               # ⚠️ חינם = אין דיסק קבוע, מסד הנתונים מתאפס בכל פריסה/רדימה. לשמירת נתונים שדרגו ל-starter והוסיפו בלוק disk.
    buildCommand: npm install
    startCommand: npm start
    domains:
      - mondial.loop-it.org  # תת-הדומיין שיחובר לאתר (צריך גם רשומת DNS — ראו DEPLOY.md)
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: ADMIN_EMAILS
        value: uv.levari@gmail.com
      # (בתוכנית חינם אין DB_PATH — מסד הנתונים נשמר מקומית ב-./mondial.db ומתאפס בכל פריסה)
      # פרטי המייל (SMTP) — הזינו את הערכים בלוח הבקרה של Render (Environment), לא כאן:
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_SECURE
        value: "true"
      - key: SMTP_USER
        sync: false          # תזינו בלוח הבקרה (סוד)
      - key: SMTP_PASS
        sync: false          # תזינו בלוח הבקרה (App Password — סוד!)
      - key: MAIL_FROM
        sync: false
      # עדכון תוצאות אוטומטי (אופציונלי) — הזינו בלוח הבקרה אם רוצים:
      - key: FOOTBALL_API_KEY
        sync: false
